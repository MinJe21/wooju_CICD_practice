name: Spring Boot CI-test

on:
  push:
    branches: [ master, ci-test ]
  pull_request:
    branches: [ master ]
    paths:
      - "**.java"       # 자바 파일이 수정되었을 때만 작동
      - "build.gradle"  # 혹은 패키지 설정 파일이 수정되었을 때 작동
      - "pom.xml"       # (Maven을 사용하시는 경우를 위해 추가)
    paths-ignore:
      - "doc/**"        # 문서 파일만 수정했을 때는 CI 로봇이 꿀잠을 잡니다.

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 자바스크립트의 Node 버전을 골랐던 것처럼, 자바 버전을 고릅니다.
        # 최근 스프링 부트에서 가장 많이 쓰는 LTS 버전인 17과 21을 설정했습니다.
        java-version: [17, 21]

    steps:
      # 1. 깃허브 코드 가져오기
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 자바(JDK) 설치 및 자동 캐싱
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'corretto' # AWS에서 제공하는 안정적인 무료 자바 배포판입니다.
          cache: 'gradle'          # npm의 node_modules 캐싱처럼, 의존성 라이브러리를 자동으로 캐시해 줍니다! (Maven을 쓰신다면 'maven'으로 변경)

      # 3. (중요!) gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        # 윈도우 환경에서 작업한 코드를 깃허브(리눅스)로 올리면 가끔 실행 권한이 사라져서 에러가 납니다. 그걸 방지하는 아주 중요한 한 줄입니다.

      # 4. 빌드 및 테스트 실행
      - name: Build with Gradle
        run: ./gradlew build
        # 자바스크립트에서는 npm install, test, build를 따로 적었지만,
        # 스프링 부트(Gradle)에서는 이 명령어 하나면 '의존성 다운로드 + 테스트 실행 + 빌드'를 한 방에 다 해줍니다!